name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          # GITHUB_TOKEN is the built-in Actions token. It has write access to
          # this repo's releases. Goreleaser also uses it to push the Homebrew
          # formula to naman833/homebrew-k8stalk. If that push fails due to
          # cross-repo permissions, create a GitHub PAT with `repo` scope on
          # naman833/homebrew-k8stalk, add it as a repository secret named
          # HOMEBREW_TAP_GITHUB_TOKEN, and uncomment the line below:
          #
          # GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
