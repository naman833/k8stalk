version: 2

project_name: k8stalk

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    binary: k8stalk

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - repository:
      owner: naman833
      name: homebrew-k8stalk
    homepage: "https://github.com/naman833/k8stalk"
    description: "GitOps-aware Kubernetes diagnostics agent"
    license: "Apache-2.0"
    binaries:
      - k8stalk

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

nfpms:
  - package_name: k8stalk
    maintainer: "naman833 <pandeynaman833@gmail.com>"
    homepage: "https://github.com/naman833/k8stalk"
    description: "GitOps-aware Kubernetes diagnostics agent"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
      - apk
